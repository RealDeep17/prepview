<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cassini Operator Desk Mockup</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-app: #06090e;
        --bg-shell: #0a0e14;
        --bg-panel: #0f141d;
        --bg-panel-2: #121925;
        --bg-panel-3: #151e2d;
        --bg-row: #0f1520;
        --bg-row-hover: #142033;
        --bg-row-active: #18253b;
        --border: rgba(140, 158, 190, 0.16);
        --border-strong: rgba(140, 158, 190, 0.28);
        --text: #eef4ff;
        --text-2: #ccd6e8;
        --text-3: #95a3bb;
        --text-4: #6d7a93;
        --blue: #71a5ff;
        --blue-soft: rgba(113, 165, 255, 0.14);
        --green: #49c788;
        --green-soft: rgba(73, 199, 136, 0.14);
        --red: #f06c76;
        --red-soft: rgba(240, 108, 118, 0.14);
        --amber: #e1ad5b;
        --amber-soft: rgba(225, 173, 91, 0.14);
        --mono: "IBM Plex Mono", "SFMono-Regular", ui-monospace, monospace;
        --sans: "SF Pro Display", "IBM Plex Sans", "Segoe UI", sans-serif;
        --topbar-h: 40px;
        --left-rail-w: 280px;
        --right-rail-w: 360px;
        --overlay-w: 560px;
        --radius: 4px;
        --radius-2: 6px;
        --shadow-shell: 0 22px 60px rgba(0, 0, 0, 0.46);
        --shadow-overlay: 0 18px 40px rgba(0, 0, 0, 0.42);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg-app);
        color: var(--text);
        font-family: var(--sans);
      }

      button,
      input,
      select,
      textarea {
        font: inherit;
      }

      button {
        border: 0;
        background: none;
        color: inherit;
        cursor: pointer;
      }

      .mockup-page {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        gap: 14px;
        padding: 18px;
      }

      .mockup-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        min-height: 44px;
        padding: 10px 14px;
        border: 1px solid var(--border);
        background: #0c1118;
        border-radius: var(--radius-2);
      }

      .mockup-toolbar-copy {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .mockup-toolbar-copy strong {
        font-size: 13px;
        letter-spacing: 0.04em;
      }

      .mockup-toolbar-copy span {
        color: var(--text-4);
        font-size: 11px;
      }

      .mockup-toolbar-actions {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-wrap: wrap;
      }

      .state-chip {
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #0a0f16;
        color: var(--text-3);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      .state-chip.active {
        color: var(--text);
        border-color: rgba(113, 165, 255, 0.4);
        background: rgba(113, 165, 255, 0.14);
      }

      .shell {
        min-height: calc(100vh - 94px);
        display: grid;
        grid-template-rows: var(--topbar-h) 1fr;
        border: 1px solid var(--border);
        border-radius: var(--radius-2);
        overflow: hidden;
        background: var(--bg-shell);
        box-shadow: var(--shadow-shell);
      }

      .topbar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        gap: 12px;
        min-height: var(--topbar-h);
        padding: 0 12px;
        border-bottom: 1px solid var(--border);
        background: #0b1016;
      }

      .topbar-block {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .topbar-block.center {
        justify-content: center;
      }

      .topbar-block.right {
        justify-content: flex-end;
      }

      .brand-mark {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .brand-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--blue);
      }

      .brand-copy {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .brand-name {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .workspace-name {
        color: var(--text-3);
        font-size: 11px;
        white-space: nowrap;
      }

      .scope-pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 24px;
        padding: 0 9px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #0d141e;
        color: var(--text-2);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .scope-pill .scope-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--blue);
      }

      .status-strip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .status-cell {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 24px;
        padding: 0 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #0c121b;
        color: var(--text-3);
        font-size: 10px;
      }

      .status-cell strong {
        color: var(--text);
        font-family: var(--mono);
        font-size: 10px;
      }

      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 999px;
        background: var(--text-4);
      }

      .status-dot.synced {
        background: var(--green);
      }

      .status-dot.stale {
        background: var(--amber);
      }

      .status-dot.degraded {
        background: var(--red);
      }

      .status-dot.local {
        background: var(--blue);
      }

      .topbar-action {
        min-height: 26px;
        padding: 0 9px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #0d141e;
        color: var(--text-2);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .topbar-action.primary {
        border-color: rgba(113, 165, 255, 0.42);
        color: #d9e7ff;
        background: rgba(113, 165, 255, 0.14);
      }

      .workspace {
        display: grid;
        grid-template-columns: var(--left-rail-w) 1fr var(--right-rail-w);
        min-height: 0;
      }

      .scope-rail,
      .inspector-rail {
        min-height: 0;
        overflow: hidden;
        background: var(--bg-panel);
      }

      .scope-rail {
        border-right: 1px solid var(--border);
      }

      .inspector-rail {
        border-left: 1px solid var(--border);
      }

      .rail-scroll {
        height: 100%;
        overflow: auto;
      }

      .rail-section {
        padding: 10px 10px 0;
      }

      .rail-section:last-child {
        padding-bottom: 12px;
      }

      .rail-label {
        margin-bottom: 8px;
        color: var(--text-4);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .rail-search {
        width: 100%;
        min-height: 30px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #0a0f16;
        color: var(--text);
        font-size: 11px;
      }

      .rail-search::placeholder {
        color: var(--text-4);
      }

      .scope-stack {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .scope-row,
      .pinned-row {
        width: 100%;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        min-height: 38px;
        padding: 7px 8px;
        border: 1px solid transparent;
        border-radius: var(--radius);
        background: transparent;
        text-align: left;
      }

      .scope-row:hover,
      .pinned-row:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      .scope-row.active,
      .pinned-row.active {
        border-color: rgba(113, 165, 255, 0.38);
        background: rgba(113, 165, 255, 0.12);
      }

      .scope-main {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .scope-icon {
        width: 18px;
        height: 18px;
        border-radius: 3px;
        border: 1px solid var(--border);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        color: var(--text-4);
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        flex-shrink: 0;
      }

      .scope-copy {
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .scope-title {
        display: flex;
        align-items: center;
        gap: 6px;
        min-width: 0;
      }

      .scope-title strong,
      .pinned-row strong {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 11px;
        font-weight: 600;
      }

      .scope-sub {
        color: var(--text-4);
        font-size: 10px;
      }

      .scope-values {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 2px;
        text-align: right;
      }

      .scope-values strong {
        font-family: var(--mono);
        font-size: 11px;
      }

      .scope-values span,
      .pinned-row span {
        color: var(--text-4);
        font-size: 10px;
      }

      .mode-badge,
      .exchange-badge,
      .sync-badge,
      .risk-badge,
      .tone-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 18px;
        padding: 0 6px;
        border-radius: 3px;
        border: 1px solid var(--border);
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        white-space: nowrap;
      }

      .exchange-badge {
        color: var(--text-3);
      }

      .mode-live {
        color: var(--blue);
        border-color: rgba(113, 165, 255, 0.35);
        background: rgba(113, 165, 255, 0.1);
      }

      .mode-manual,
      .mode-import {
        color: var(--amber);
        border-color: rgba(225, 173, 91, 0.3);
        background: rgba(225, 173, 91, 0.1);
      }

      .tone-synced {
        color: var(--green);
        border-color: rgba(73, 199, 136, 0.35);
        background: rgba(73, 199, 136, 0.1);
      }

      .tone-stale {
        color: var(--amber);
        border-color: rgba(225, 173, 91, 0.3);
        background: rgba(225, 173, 91, 0.1);
      }

      .tone-degraded {
        color: var(--red);
        border-color: rgba(240, 108, 118, 0.3);
        background: rgba(240, 108, 118, 0.1);
      }

      .tone-local {
        color: var(--blue);
        border-color: rgba(113, 165, 255, 0.35);
        background: rgba(113, 165, 255, 0.1);
      }

      .exchange-cluster {
        margin-top: 4px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        overflow: hidden;
      }

      .exchange-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        min-height: 34px;
        padding: 0 8px;
        border-bottom: 1px solid var(--border);
        background: #0d131c;
      }

      .exchange-row button {
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 34px;
        padding: 0;
        text-align: left;
      }

      .exchange-row strong {
        font-size: 11px;
      }

      .exchange-row span {
        color: var(--text-4);
        font-size: 10px;
      }

      .exchange-accounts {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 4px;
        background: #0c121b;
      }

      .subset-note {
        color: var(--text-4);
        font-size: 10px;
        line-height: 1.4;
      }

      .workbench {
        min-height: 0;
        display: grid;
        grid-template-rows: 38% 62%;
        background: #090d13;
      }

      .band {
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      .band + .band {
        border-top: 1px solid var(--border);
      }

      .band-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 34px;
        padding: 0 10px;
        border-bottom: 1px solid var(--border);
        background: #0d131b;
      }

      .band-tabs {
        display: flex;
        align-items: center;
        gap: 2px;
      }

      .band-tab {
        min-height: 24px;
        padding: 0 8px;
        border-radius: var(--radius);
        color: var(--text-4);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .band-tab.active {
        color: var(--text);
        background: rgba(113, 165, 255, 0.12);
      }

      .band-tools {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text-4);
        font-size: 10px;
      }

      .band-chip,
      .filter-chip,
      .toggle-chip {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 22px;
        padding: 0 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #0f1621;
        color: var(--text-3);
        font-size: 10px;
      }

      .band-chip.active,
      .filter-chip.active,
      .toggle-chip.active {
        border-color: rgba(113, 165, 255, 0.4);
        background: rgba(113, 165, 255, 0.12);
        color: var(--text);
      }

      .band-body {
        min-height: 0;
        overflow: hidden;
        padding: 10px;
      }

      .monitor-grid {
        height: 100%;
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) minmax(280px, 0.85fr);
        gap: 10px;
      }

      .panel {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-panel);
        overflow: hidden;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        min-height: 30px;
        padding: 0 10px;
        border-bottom: 1px solid var(--border);
        background: #101722;
      }

      .panel-header strong {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
      }

      .panel-header span {
        color: var(--text-4);
        font-size: 10px;
      }

      .panel-body {
        height: calc(100% - 30px);
        padding: 10px;
      }

      .monitor-main {
        display: grid;
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 10px;
      }

      .monitor-side {
        display: grid;
        grid-template-rows: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .chart-wrap {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 10px;
      }

      .chart-head {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
      }

      .chart-head strong {
        display: block;
        font-size: 15px;
        font-weight: 600;
      }

      .chart-head span,
      .mini-note {
        color: var(--text-4);
        font-size: 10px;
      }

      .chart-kpis {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .chart-kpis div {
        display: flex;
        flex-direction: column;
        gap: 3px;
      }

      .chart-kpis span {
        color: var(--text-4);
        font-size: 10px;
      }

      .chart-kpis strong {
        font-family: var(--mono);
        font-size: 12px;
      }

      .chart-svg {
        width: 100%;
        height: 100%;
        display: block;
        border: 1px solid rgba(255, 255, 255, 0.04);
        background: #0b1017;
      }

      .chart-footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        color: var(--text-4);
        font-size: 10px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .summary-cell,
      .stack-cell {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.02);
        padding: 8px;
      }

      .summary-cell span,
      .stack-cell span {
        display: block;
        color: var(--text-4);
        font-size: 10px;
      }

      .summary-cell strong,
      .stack-cell strong {
        display: block;
        margin-top: 4px;
        font-family: var(--mono);
        font-size: 13px;
      }

      .fee-strip,
      .sync-stack,
      .account-stack,
      .risk-stack {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .list-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 8px;
        align-items: center;
        min-height: 34px;
        padding: 6px 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.02);
      }

      .list-row strong {
        display: block;
        font-size: 11px;
      }

      .list-row span {
        color: var(--text-4);
        font-size: 10px;
      }

      .list-row .value {
        font-family: var(--mono);
        font-size: 11px;
        text-align: right;
      }

      .value.positive {
        color: var(--green);
      }

      .value.negative {
        color: var(--red);
      }

      .value.warning {
        color: var(--amber);
      }

      .bars {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .bar-row {
        display: grid;
        grid-template-columns: 120px minmax(0, 1fr) 64px;
        gap: 8px;
        align-items: center;
      }

      .bar-row strong {
        font-size: 11px;
      }

      .bar-track {
        position: relative;
        height: 22px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #0b1017;
        overflow: hidden;
      }

      .bar-stack {
        position: absolute;
        inset: 0;
        display: flex;
      }

      .bar-segment {
        height: 100%;
      }

      .bar-label {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 8px;
        font-size: 10px;
        pointer-events: none;
      }

      .bar-value {
        text-align: right;
        font-family: var(--mono);
        font-size: 11px;
      }

      .risk-ladder {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }

      .risk-row {
        display: grid;
        grid-template-columns: 150px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        min-height: 36px;
        padding: 7px 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.02);
      }

      .risk-row-main {
        min-width: 0;
      }

      .risk-row-main strong {
        display: block;
        font-size: 11px;
      }

      .risk-row-main span {
        color: var(--text-4);
        font-size: 10px;
      }

      .distance-track {
        position: relative;
        height: 8px;
        border-radius: 999px;
        background: #0a0f16;
        overflow: hidden;
      }

      .distance-fill {
        height: 100%;
        border-radius: inherit;
      }

      .distance-meta {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        margin-top: 6px;
        color: var(--text-4);
        font-size: 10px;
      }

      .ledger-layout {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
        gap: 8px;
      }

      .ledger-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .ledger-filters,
      .ledger-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .ledger-table-shell {
        min-height: 0;
        overflow: auto;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--bg-panel);
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      thead th {
        position: sticky;
        top: 0;
        z-index: 2;
        height: 32px;
        padding: 0 8px;
        border-bottom: 1px solid var(--border);
        background: #101722;
        color: var(--text-4);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        text-align: left;
        white-space: nowrap;
      }

      tbody td {
        height: 40px;
        padding: 0 8px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        font-size: 11px;
        white-space: nowrap;
      }

      .compact-rows tbody td {
        height: 36px;
      }

      tbody tr:hover {
        background: rgba(255, 255, 255, 0.02);
      }

      tbody tr.selected {
        background: var(--bg-row-active);
      }

      function formatCurrency(value) {
        return new Intl.NumberFormat('en-US', {
          style: 'currency',
          currency: 'USD',
          maximumFractionDigits: value >= 100 ? 0 : 2,
        }).format(value);
      }

      function formatSigned(value) {
        const abs = formatCurrency(Math.abs(value));
        if (value > 0) return `+${abs}`;
        if (value < 0) return `-${abs}`;
        return abs;
      }

      function formatCompact(value) {
        return new Intl.NumberFormat('en-US', {
          notation: 'compact',
          maximumFractionDigits: 1,
        }).format(value);
      }

      function formatQty(value) {
        return new Intl.NumberFormat('en-US', {
          maximumFractionDigits: value >= 1000 ? 0 : 2,
        }).format(value);
      }

      function titleCase(value) {
        return value
          .split(/[_-]/g)
          .map((token) => token.charAt(0).toUpperCase() + token.slice(1))
          .join(' ');
      }

      function toneClass(value) {
        if (value === 'synced') return 'tone-synced';
        if (value === 'stale') return 'tone-stale';
        if (value === 'degraded') return 'tone-degraded';
        return 'tone-local';
      }

      function sideClass(side) {
        return side === 'long' ? 'side-long' : 'side-short';
      }

      function getScopedAccounts() {
        if (state.scope.kind === 'portfolio') return DATA.accounts;
        if (state.scope.kind === 'exchange') {
          return DATA.accounts.filter((account) => account.exchange === state.scope.exchange);
        }
        if (state.scope.kind === 'account') {
          return DATA.accounts.filter((account) => account.id === state.scope.accountId);
        }
        if (state.scope.kind === 'subset') {
          return DATA.accounts.filter((account) => state.scope.accountIds.includes(account.id));
        }
        return DATA.accounts;
      }

      function getScopedPositions() {
        const ids = new Set(getScopedAccounts().map((account) => account.id));
        return DATA.positions.filter((position) => ids.has(position.accountId));
      }

      function getScopedClosedTrades() {
        const ids = new Set(getScopedAccounts().map((account) => account.id));
        return DATA.closedTrades.filter((trade) => ids.has(trade.accountId));
      }

      function getScopedFunding() {
        const names = new Set(getScopedAccounts().map((account) => account.name));
        return DATA.funding.filter((row) => names.has(row.account));

        return DATA.syncJobs.filter((job) => ids.has(job.accountId));

      function getScopeLabel() {
        if (state.scope.kind === 'portfolio') return 'All Portfolio';
        if (state.scope.kind === 'exchange') return titleCase(state.scope.exchange);
        if (state.scope.kind === 'account') {
          const account = DATA.accounts.find((item) => item.id === state.scope.accountId);
          return account ? account.name : 'Account';
        }
        if (state.scope.kind === 'subset') {
          return `${state.scope.accountIds.length} Account Subset`;
        }
        return 'All Portfolio';

      function getScopeSummary() {
        const accounts = getScopedAccounts();
        const positions = getScopedPositions();
        const totalEquity = accounts.reduce((sum, account) => sum + account.snapshotEquity, 0);
        const wallet = accounts.reduce((sum, account) => sum + account.walletBalance, 0);
        const available = accounts.reduce((sum, account) => sum + account.availableBalance, 0);
        const usedMargin = positions.reduce((sum, row) => sum + row.marginUsed, 0);
        const feeBurn = positions.reduce((sum, row) => sum + row.feePaid, 0);
        const fundingBurn = positions.reduce((sum, row) => sum + row.fundingPaid, 0);
        const totalUnrealized = positions.reduce((sum, row) => sum + row.unrealizedPnl, 0);
        return {
          totalEquity,
          wallet,
          available,
          usedMargin,
          feeBurn,
          fundingBurn,
          totalUnrealized,
          accounts: accounts.length,
          positions: positions.length,
        };
      }

      function getScopeHistory() {
        const accounts = getScopedAccounts();
        const maxPoints = Math.max(...accounts.map((account) => account.points.length));
        return new Array(maxPoints).fill(0).map((_, index) =>
          accounts.reduce((sum, account) => sum + (account.points[index] || 0), 0)
        );
      }

      function buildPolyline(points, width, height, pad = 18) {
        const min = Math.min(...points);
        const max = Math.max(...points);
        const range = max - min || 1;
        const step = (width - pad * 2) / Math.max(points.length - 1, 1);
        return points
          .map((point, index) => {
            const x = pad + index * step;
            const y = height - pad - ((point - min) / range) * (height - pad * 2);
            return `${x.toFixed(2)},${y.toFixed(2)}`;
          })
          .join(' ');
      }

      function renderExposureMonitor() {
        const positions = getScopedPositions();
        const grouped = positions.reduce((map, row) => {
          map[row.symbol] = map[row.symbol] || { long: 0, short: 0, accounts: {} };
          if (row.side === 'long') map[row.symbol].long += row.notional;
          else map[row.symbol].short += row.notional;
          map[row.symbol].accounts[row.accountName] = (map[row.symbol].accounts[row.accountName] || 0) + row.notional;
          return map;
        }, {});
        const symbols = Object.entries(grouped)
          .map(([symbol, value]) => ({
            symbol,
            long: value.long,
            short: value.short,
            net: value.long - value.short,
            accounts: Object.entries(value.accounts).sort((a, b) => b[1] - a[1]),
          }))
          .sort((a, b) => Math.abs(b.net) - Math.abs(a.net));
        const maxExposure = Math.max(...symbols.map((item) => Math.max(item.long, item.short, Math.abs(item.net))), 1);
        const focus = symbols[0];
        return `
          <div class="monitor-grid">
            <div class="panel">
              <div class="panel-header">
                <strong>Net Exposure Structure</strong>
                <span>long / short / net direct labels</span>
              </div>
              <div class="panel-body">
                <div class="bars">
                  ${symbols
                    .map((item) => {
                      const longPct = (item.long / maxExposure) * 100;
                      const shortPct = (item.short / maxExposure) * 100;
                      return `
                        <div class="bar-row">
                          <strong>${item.symbol}</strong>
                          <div class="bar-track">
                            <div class="bar-stack">
                              <span class="bar-segment" style="width:${longPct}%; background:rgba(73,199,136,0.68)"></span>
                              <span class="bar-segment" style="width:${shortPct}%; background:rgba(240,108,118,0.68)"></span>
                            </div>
                            <div class="bar-label">
                              <span>${formatCompact(item.long)} long</span>
                              <span>${formatCompact(item.short)} short</span>
                            </div>
                          </div>
                          <div class="bar-value ${item.net >= 0 ? 'positive' : 'negative'}">${item.net >= 0 ? '+' : '-'}${formatCompact(Math.abs(item.net))}</div>
                        </div>
                      `;
                    })
                    .join('')}

              </div>
            </div>

            <div class="monitor-side">
              <div class="panel">
                <div class="panel-header">
                  <strong>Selected Symbol</strong>
                  <span>${focus ? focus.symbol : 'n/a'}</span>
                </div>
                <div class="panel-body">
                  ${
                    focus
                      ? `
                        <div class="summary-grid">

                          <div class="summary-cell"><span>Short</span><strong>${formatCurrency(focus.short)}</strong></div>
                          <div class="summary-cell"><span>Net</span><strong>${formatSigned(focus.net)}</strong></div>
                          <div class="summary-cell"><span>Contributors</span><strong>${focus.accounts.length}</strong></div>
                        </div>

                      : '<div class="compact-empty">No scoped exposure.</div>'
                  }
                </div>
              </div>

              <div class="panel">
                <div class="panel-header">
                  <strong>Account Contribution</strong>

                </div>

                  <div class="account-stack">

                      .map(
                        ([account, value]) => `
                          <div class="list-row">
                            <div><strong>${account}</strong><span>${focus.symbol}</span></div>
                            <div class="value">${formatCurrency(value)}</div>
                          </div>
                        `
                      )
                      .join('')}

      function renderRiskMonitor() {
        const positions = getScopedPositions();
        const cards = getScopedAccounts()
          .map((account) => {
            const accountPositions = positions.filter((row) => row.accountId === account.id);
            const grossExposure = accountPositions.reduce((sum, row) => sum + row.notional, 0);
            const usedMargin = accountPositions.reduce((sum, row) => sum + row.marginUsed, 0);
            const nearestDistance = accountPositions.reduce((nearest, row) => {
              const current = row.markPrice || row.entryPrice;
              const dist = Math.abs(((row.liquidationPrice - current) / current) * 100);
              return Math.min(nearest, dist);
            }, Infinity);
            const avgLev = accountPositions.length
              ? accountPositions.reduce((sum, row) => sum + row.leverage, 0) / accountPositions.length
              : 0;
            const maintenance = accountPositions.reduce((sum, row) => sum + row.maintenanceMargin, 0);
            return {
              account,
              grossExposure,
              usedMargin,
              freeMargin: Math.max(account.availableBalance, 0),
              nearestDistance,
              avgLev,
              maintenance,
              openPositions: accountPositions.length,
            };
          })
          .sort((left, right) => left.nearestDistance - right.nearestDistance);
        const maxDistance = Math.max(...cards.map((card) => (isFinite(card.nearestDistance) ? card.nearestDistance : 0)), 1);

        return `
          <div class="panel" style="height:100%">
            <div class="panel-header">
              <strong>Per-Account Risk Ladder</strong>
              <span>sorted by nearest liquidation distance</span>
            </div>
            <div class="panel-body">
              <div class="risk-ladder">
                ${cards
                  .map((card) => {
                    const pct = isFinite(card.nearestDistance) ? Math.max(8, (card.nearestDistance / maxDistance) * 100) : 0;
                    const tone = card.nearestDistance < 6 ? 'var(--red)' : card.nearestDistance < 12 ? 'var(--amber)' : 'var(--green)';
                    return `
                      <div class="risk-row">
                        <div class="risk-row-main">
                          <strong>${card.account.name}</strong>
                          <span>${titleCase(card.account.exchange)} · ${card.openPositions} open · ${card.avgLev.toFixed(1)}x avg</span>
                        </div>
                        <div>
                          <div class="distance-track">
                            <div class="distance-fill" style="width:${pct}%; background:${tone}"></div>
                          </div>
                          <div class="distance-meta">
                            <span>maint ${formatCurrency(card.maintenance)}</span>
                            <span>used ${formatCurrency(card.usedMargin)}</span>
                            <span>free ${formatCurrency(card.freeMargin)}</span>
                          </div>
                        </div>
                        <div class="value ${card.nearestDistance < 6 ? 'negative' : card.nearestDistance < 12 ? 'warning' : 'positive'}">${isFinite(card.nearestDistance) ? `${card.nearestDistance.toFixed(1)}%` : 'n/a'}</div>
                      </div>
                    `;
                  })
                  .join('')}
              </div>
            </div>
          </div>
        `;
      }

      function renderLedgerTabs() {
        const tabs = document.getElementById('ledger-tabs');
        tabs.innerHTML = ledgerTabs
          .map(
            (tab) => `
              <button class="band-tab ${state.activeLedger === tab ? 'active' : ''}" data-ledger-tab="${tab}">
                ${
                  tab === 'positions'
                    ? 'Positions'
                    : tab === 'closed'
                      ? 'Closed Trades'
                      : tab === 'journal'
                        ? 'Journal'
                        : tab === 'funding'
                          ? 'Funding'
                          : 'Sync'
                }
              </button>
            `
          )
          .join('');

        tabs.querySelectorAll('[data-ledger-tab]').forEach((button) => {
          button.addEventListener('click', () => {
            state.activeLedger = button.dataset.ledgerTab;
            renderLedgerTabs();
            renderLedgerBody();

        backdrop.classList.add('open');
        sheet.classList.add('open');

        if (state.activeOverlay === 'manual') {
          sheet.innerHTML = renderManualOverlay();
        } else if (state.activeOverlay === 'account') {
          sheet.innerHTML = renderAccountOverlay();
        } else if (state.activeOverlay === 'import') {
          sheet.innerHTML = renderImportOverlay();
        } else {
          sheet.innerHTML = renderSettingsOverlay();
        }

        sheet.querySelector('[data-close-overlay]')?.addEventListener('click', () => {
          state.activeOverlay = null;
          renderOverlay();
        });

        sheet.querySelectorAll('[data-manual-step]').forEach((button) => {
          button.addEventListener('click', () => {
            state.manualStep = button.dataset.manualStep;
            renderOverlay();
          });
        });

        sheet.querySelectorAll('[data-account-overlay-tab]').forEach((button) => {
          button.addEventListener('click', () => {
            state.accountOverlayTab = button.dataset.accountOverlayTab;
            renderOverlay();

                    <div class="form-grid">
                      <div class="field"><label>Venue</label><select><option>BloFin</option><option>Hyperliquid</option></select></div>
                      <div class="field"><label>Account Label</label><input value="HL Vault 02" /></div>
                      <div class="field"><label>Wallet / Ref</label><input value="0x8b...c199" /></div>
                      <div class="field"><label>Connection Label</label><input value="Research Seat" /></div>
                    </div>
                    <div class="review-card">
                      <strong>Validation Preview</strong>
                      <span>Credentials validate first, then first sync is launched. No key material is shown.</span>
                      <div class="summary-grid">
                        <div class="summary-cell"><span>Status</span><strong>validated</strong></div>
                        <div class="summary-cell"><span>First sync</span><strong>pending</strong></div>
                      </div>
                    </div>
                    <div class="overlay-footer">
                      <div class="footer-note">Read-only exchange mode only.</div>
                      <div class="footer-actions">
                        <button class="footer-button">Validate</button>
                        <button class="footer-button primary">Create + Sync</button>
                      </div>
                    </div>
                  </div>
                `
                : `
                  <div class="form-stack">
                    <div class="form-grid">
                      <div class="field"><label>Name</label><input value="Manual Research Book" /></div>
                      <div class="field"><label>Exchange Identity</label><select><option>Manual / Local</option><option>Imported / Unsupported</option><option>BloFin</option><option>Hyperliquid</option></select></div>
                      <div class="field"><label>Wallet Balance</label><input value="25000" /></div>
                      <div class="field"><label>Notes</label><input value="carry basket" /></div>
                    </div>
                    <div class="overlay-footer">
                      <div class="footer-note">Local books are first-class, not fallback mode.</div>
                      <div class="footer-actions">
                        <button class="footer-button primary">Create Local Account</button>
                      </div>
                    </div>
                  </div>
                `
            }
          </div>
        `;
      }

      function renderImportOverlay() {
        return `
          <div class="overlay-header">
            <div>
              <strong>CSV Import</strong>
              <span>Right-side import drawer with accepted and rejected rows surfaced directly.</span>
            </div>
            <button class="overlay-close" data-close-overlay>×</button>
          </div>
          <div class="overlay-body">
            <div class="form-stack">
              <div class="form-grid">
                <div class="field"><label>Source Exchange</label><select><option>Imported / Unsupported</option><option>BloFin</option><option>Hyperliquid</option></select></div>
                <div class="field"><label>Target Account</label><select><option>Imported Legacy</option><option>Manual Core</option></select></div>
              </div>
              <div class="field">
                <label>Payload</label>
                <textarea>symbol,exchange_symbol,margin_mode,side,entry_price,quantity,leverage,mark_price
BTC-PERP,BTC,cross,long,69220,1.2,5,69660
ETH-PERP,ETH,isolated,short,3314,12,4,3301</textarea>
              </div>
              <div class="import-results">
                <div class="summary-cell"><span>Accepted</span><strong>38 rows</strong></div>
                <div class="summary-cell"><span>Rejected</span><strong>2 rows</strong></div>
              </div>
              <div class="rejected-table">
                <table>
                  <thead>
                    <tr><th>Row</th><th>Reason</th></tr>
                  </thead>
                  <tbody>
                    <tr><td class="number">12</td><td>Leverage exceeds max market rule</td></tr>
                    <tr><td class="number">19</td><td>Quantity step mismatch</td></tr>
                  </tbody>
                </table>
              </div>
              <div class="overlay-footer">
                <div class="footer-note">Mocked from current backend import contract and partial-reject behavior.</div>
                <div class="footer-actions">
                  <button class="footer-button">Validate</button>
                  <button class="footer-button primary">Import Rows</button>
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function renderSettingsOverlay() {
        return `
          <div class="overlay-header">
            <div>
              <strong>Workspace Settings</strong>
              <span>Real operator controls, not a shallow toggles page.</span>
            </div>
            <button class="overlay-close" data-close-overlay>×</button>
          </div>
          <div class="overlay-body">
            <div class="form-stack">
              <div class="settings-section">
                <strong>Layout</strong>
                <div class="settings-list">
                  <div class="settings-row">
                    <div class="settings-copy"><span>Compact rows</span><small>Changes ledger density immediately in the mockup.</small></div>
                    <button class="toggle ${state.settings.compactRows ? 'active' : ''}" data-setting-toggle="compactRows"><span></span></button>
                  </div>
                  <div class="settings-row">
                    <div class="settings-copy"><span>Account curves</span><small>Shows thin account curves behind the portfolio curve.</small></div>
                    <button class="toggle ${state.settings.showAccountCurves ? 'active' : ''}" data-setting-toggle="showAccountCurves"><span></span></button>
                  </div>
                  <div class="settings-row">
                    <div class="settings-copy"><span>Fee board</span><small>Keeps fee and funding drag visible in the overview rail.</small></div>
                    <button class="toggle ${state.settings.showFeeBoard ? 'active' : ''}" data-setting-toggle="showFeeBoard"><span></span></button>
                  </div>
                </div>
              </div>

              <div class="settings-section">
                <strong>Review</strong>
                <div class="form-grid" style="margin-top:8px">
                  <div class="field"><label>Default history grouping</label><select><option ${state.settings.defaultHistoryGrouping === 'time' ? 'selected' : ''}>time</option><option>account</option><option>exchange</option></select></div>
                  <div class="field"><label>Default history window</label><select><option ${state.settings.historyWindow === '30d' ? 'selected' : ''}>30d</option><option>7d</option><option>90d</option><option>all</option></select></div>
                </div>
              </div>

              <div class="settings-section">
                <strong>Sync + LAN</strong>
                <div class="summary-grid" style="margin-top:8px">
                  <div class="summary-cell"><span>Auto-sync interval</span><strong>${DATA.autoSyncStatus.intervalSeconds}s</strong></div>
                  <div class="summary-cell"><span>Next cycle</span><strong>${DATA.autoSyncStatus.nextScheduledAt}</strong></div>
                  <div class="summary-cell"><span>LAN mode</span><strong>${DATA.lanStatus.exposeToLan ? 'LAN' : 'localhost'}</strong></div>
                  <div class="summary-cell"><span>Viewer token</span><strong>${DATA.lanStatus.tokenState}</strong></div>
                </div>
              </div>

              <div class="settings-section">
                <strong>Honesty</strong>
                <div class="compact-empty" style="margin-top:8px">
                  Manual/local badges, derived risk badges, stale markers, and degraded sync surfaces remain visible by default. No fake “clean mode” hides uncertainty.
                </div>
              </div>
            </div>
          </div>
        `;
      }

      function attachLedgerRowHandlers() {
        document.querySelectorAll('[data-position-id]').forEach((row) => {
          row.addEventListener('click', () => {
            state.selectedPositionId = row.dataset.positionId;
            state.inspectorTab = 'selection';
            render();
          });
        });
      }

      function render() {
        document.getElementById('shell').classList.toggle('compact-rows', !!state.settings.compactRows);
        renderPresetSwitcher();
        renderTopBar();
        renderScopeRail();
        renderMonitorTabs();
        renderMonitorBody();
        renderLedgerTabs();
        renderLedgerBody();
        renderInspector();
        renderOverlay();
        attachLedgerRowHandlers();
      }

      applyPreset('overview');
    </script>
  </body>
</html>
